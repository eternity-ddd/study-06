<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 24px;
    }

    header h1 { font-size: 1.5rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }

    .input-area {
      padding: 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f46e5; }

    .input-area button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #4338ca; }

    .filters {
      display: flex;
      padding: 12px 20px;
      gap: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    .filters button {
      border: 1.5px solid #d1d5db;
      background: white;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #6b7280;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: white;
    }

    .list { padding: 8px 0; min-height: 80px; }

    .empty {
      text-align: center;
      color: #9ca3af;
      padding: 40px 20px;
      font-size: 0.9rem;
    }

    .item {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      gap: 12px;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #f9fafb; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #111827;
      transition: all 0.2s;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .item .delete-btn {
      border: none;
      background: none;
      color: #d1d5db;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.2s;
      line-height: 1;
    }

    .item .delete-btn:hover { color: #ef4444; background: #fee2e2; }

    footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #6b7280;
    }

    footer button {
      border: none;
      background: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.82rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    footer button:hover { background: #fee2e2; }
    footer button:disabled { color: #d1d5db; cursor: default; }
    footer button:disabled:hover { background: none; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>쇼핑 리스트</h1>
    <p id="summary">아이템이 없습니다</p>
  </header>

  <div class="input-area">
    <input type="text" id="new-item" placeholder="아이템 입력 후 Enter 또는 +" maxlength="100">
    <button id="add-btn" title="추가">+</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">전체</button>
    <button data-filter="todo">미완료</button>
    <button data-filter="done">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <footer>
    <span id="count"></span>
    <button id="clear-done-btn">완료 항목 삭제</button>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://tpnuniswjrzvvnrngqdt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwbnVuaXN3anJ6dnZucm5ncWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODIyMjcsImV4cCI6MjA5MDI1ODIyN30.Hl_vd-W9z6Ik_dNOufkrdSnkslrOndDHZ6CHKi_PWo4';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let items = [];
  let filter = 'all';

  const listEl = document.getElementById('list');
  const input = document.getElementById('new-item');
  const summaryEl = document.getElementById('summary');
  const countEl = document.getElementById('count');
  const clearDoneBtn = document.getElementById('clear-done-btn');

  function render() {
    const filtered = items.filter(item =>
      filter === 'all' ? true :
      filter === 'done' ? item.done :
      !item.done
    );

    listEl.innerHTML = '';

    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="empty">아이템이 없습니다</div>';
    } else {
      filtered.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.done ? ' done' : '');
        li.dataset.id = item.id;
        li.innerHTML = `
          <input type="checkbox" ${item.done ? 'checked' : ''}>
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" title="삭제">✕</button>
        `;
        listEl.appendChild(li);
      });
    }

    const total = items.length;
    const doneCount = items.filter(i => i.done).length;
    summaryEl.textContent = total === 0
      ? '아이템이 없습니다'
      : `${total}개 중 ${doneCount}개 완료`;
    countEl.textContent = `총 ${total}개`;
    clearDoneBtn.disabled = doneCount === 0;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function loadItems() {
    const { data, error } = await supabase
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) {
      items = data;
      render();
    }
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    const { data, error } = await supabase
      .from('shopping_items')
      .insert({ text, done: false })
      .select()
      .single();
    if (!error) {
      items.unshift(data);
      render();
    }
  }

  listEl.addEventListener('click', async e => {
    const li = e.target.closest('.item');
    if (!li) return;
    const id = Number(li.dataset.id);

    if (e.target.matches('input[type="checkbox"]')) {
      const done = e.target.checked;
      const { error } = await supabase
        .from('shopping_items')
        .update({ done })
        .eq('id', id);
      if (!error) {
        const item = items.find(i => i.id === id);
        if (item) item.done = done;
        render();
      }
    }

    if (e.target.matches('.delete-btn')) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    }
  });

  document.getElementById('add-btn').addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  clearDoneBtn.addEventListener('click', async () => {
    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .eq('done', true);
    if (!error) {
      items = items.filter(i => !i.done);
      render();
    }
  });

  loadItems();
</script>
</body>
</html>
